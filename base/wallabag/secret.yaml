  namespace: wallabag
  labels:
    app.kubernetes.io/name: wallabag
    app.kubernetes.io/part-of: wallabag-stack
    app.kubernetes.io/component: config
  annotations:
    kubernetes.io/description: "Sealed credentials used by Wallabag and MariaDB."
spec:
  encryptedData:
    MYSQL_PASSWORD: 
    MYSQL_ROOT_PASSWORD: 
  template:
    metadata:
      name: wallabag-secrets
      namespace: wallabag
      labels:
        app.kubernetes.io/name: wallabag
        app.kubernetes.io/part-of: wallabag-stack
        app.kubernetes.io/component: config
      annotations:
        kubernetes.io/description: "Credentials used by Wallabag and MariaDB."
    type: Opaque
