apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wallabag-images
  namespace: wallabag
  labels:
    app.kubernetes.io/name: wallabag
    app.kubernetes.io/part-of: wallabag-stack
    app.kubernetes.io/component: assets
  annotations:
    kubernetes.io/description: "Persistent image storage mounted by Wallabag."
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: wallabag
  namespace: wallabag
  labels:
    app.kubernetes.io/name: wallabag
    app.kubernetes.io/part-of: wallabag-stack
    app.kubernetes.io/component: web
  annotations:
    kubernetes.io/description: "Cluster-internal Wallabag web service."
spec:
  ports:
    - port: 80
  selector:
    app.kubernetes.io/name: wallabag
    app.kubernetes.io/component: web
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallabag
  namespace: wallabag
  labels:
    app.kubernetes.io/name: wallabag
    app.kubernetes.io/part-of: wallabag-stack
    app.kubernetes.io/component: web
  annotations:
    kubernetes.io/description: "Wallabag application deployment."
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: wallabag
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wallabag
        app.kubernetes.io/part-of: wallabag-stack
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: wallabag
          image: wallabag/wallabag:2.6.8
          ports:
            - containerPort: 80
          env:
            - name: SYMFONY__ENV__DATABASE_DRIVER
              value: pdo_mysql
            - name: SYMFONY__ENV__DATABASE_HOST
              value: wallabag-db
            - name: SYMFONY__ENV__DATABASE_PORT
              value: "3306"
            - name: SYMFONY__ENV__DATABASE_NAME
              value: wallabag
            - name: SYMFONY__ENV__DATABASE_USER
              value: wallabag
            - name: SYMFONY__ENV__DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wallabag-secrets
                  key: MYSQL_PASSWORD
            - name: SYMFONY__ENV__REDIS_HOST
              value: wallabag-redis
            - name: SYMFONY__ENV__DOMAIN_NAME
              value: "https://wallabag.lcat.dev"
            - name: SYMFONY__ENV__SERVER_NAME
              value: "Wallabag"
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          volumeMounts:
            - name: images
              mountPath: /var/www/wallabag/web/assets/images
      volumes:
        - name: images
          persistentVolumeClaim:
            claimName: wallabag-images
