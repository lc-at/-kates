apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wallabag-db
  namespace: wallabag
  labels:
    app.kubernetes.io/name: wallabag
    app.kubernetes.io/part-of: wallabag-stack
    app.kubernetes.io/component: database
  annotations:
    kubernetes.io/description: "Persistent MariaDB data volume for Wallabag."
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: wallabag-db
  namespace: wallabag
  labels:
    app.kubernetes.io/name: wallabag
    app.kubernetes.io/part-of: wallabag-stack
    app.kubernetes.io/component: database
  annotations:
    kubernetes.io/description: "Cluster-internal MariaDB service for Wallabag."
spec:
  ports:
    - port: 3306
  selector:
    app.kubernetes.io/name: wallabag
    app.kubernetes.io/component: database
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallabag-db
  namespace: wallabag
  labels:
    app.kubernetes.io/name: wallabag
    app.kubernetes.io/part-of: wallabag-stack
    app.kubernetes.io/component: database
  annotations:
    kubernetes.io/description: "MariaDB backing database for Wallabag."
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: wallabag
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wallabag
        app.kubernetes.io/part-of: wallabag-stack
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: db
          image: mariadb
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wallabag-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: wallabag
            - name: MYSQL_USER
              value: wallabag
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wallabag-secrets
                  key: MYSQL_PASSWORD
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/mysql
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: wallabag-db
