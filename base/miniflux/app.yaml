apiVersion: v1
kind: Service
metadata:
  name: miniflux
  namespace: miniflux
  labels:
    app.kubernetes.io/name: miniflux
    app.kubernetes.io/part-of: miniflux-stack
    app.kubernetes.io/component: web
  annotations:
    kubernetes.io/description: "Cluster-internal Miniflux web service."
spec:
  ports:
    - port: 8080
  selector:
    app.kubernetes.io/name: miniflux
    app.kubernetes.io/component: web
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: miniflux
  namespace: miniflux
  labels:
    app.kubernetes.io/name: miniflux
    app.kubernetes.io/part-of: miniflux-stack
    app.kubernetes.io/component: web
  annotations:
    kubernetes.io/description: "Miniflux application deployment."
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: miniflux
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: miniflux
        app.kubernetes.io/part-of: miniflux-stack
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: miniflux
          image: miniflux/miniflux:latest
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: miniflux-secrets
                  key: DATABASE_URL
            - name: RUN_MIGRATIONS
              value: "1"
            - name: CREATE_ADMIN
              value: "1"
            - name: ADMIN_USERNAME
              value: "admin"
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: miniflux-secrets
                  key: ADMIN_PASSWORD
            - name: BASE_URL
              value: "https://miniflux.lcat.dev"
