apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: miniflux-db
  namespace: miniflux
  labels:
    app.kubernetes.io/name: miniflux
    app.kubernetes.io/part-of: miniflux-stack
    app.kubernetes.io/component: database
  annotations:
    kubernetes.io/description: "Persistent data volume for Miniflux PostgreSQL."
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: miniflux-db
  namespace: miniflux
  labels:
    app.kubernetes.io/name: miniflux
    app.kubernetes.io/part-of: miniflux-stack
    app.kubernetes.io/component: database
  annotations:
    kubernetes.io/description: "Cluster-internal PostgreSQL service for Miniflux."
spec:
  ports:
    - port: 5432
  selector:
    app.kubernetes.io/name: miniflux
    app.kubernetes.io/component: database
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: miniflux-db
  namespace: miniflux
  labels:
    app.kubernetes.io/name: miniflux
    app.kubernetes.io/part-of: miniflux-stack
    app.kubernetes.io/component: database
  annotations:
    kubernetes.io/description: "PostgreSQL backing database for Miniflux."
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: miniflux
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: miniflux
        app.kubernetes.io/part-of: miniflux-stack
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: db
          image: postgres:18
          env:
            - name: POSTGRES_USER
              value: miniflux
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: miniflux-secrets
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: miniflux-db
