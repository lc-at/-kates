apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: miniflux-secrets
  namespace: miniflux
  labels:
    app.kubernetes.io/name: miniflux
    app.kubernetes.io/part-of: miniflux-stack
    app.kubernetes.io/component: config
  annotations:
    kubernetes.io/description: "Sealed credentials and connection settings used by Miniflux and PostgreSQL."
spec:
  encryptedData:
    ADMIN_PASSWORD: 
    DATABASE_URL: 
    POSTGRES_PASSWORD: 
  template:
    metadata:
      name: miniflux-secrets
      namespace: miniflux
      labels:
        app.kubernetes.io/name: miniflux
        app.kubernetes.io/part-of: miniflux-stack
        app.kubernetes.io/component: config
      annotations:
        kubernetes.io/description: "Credentials and connection settings used by Miniflux and PostgreSQL."
    type: Opaque
