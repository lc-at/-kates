apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: miniflux-wildcard-lcat-dev
  namespace: miniflux
  annotations:
    kubernetes.io/description: "Wildcard TLS certificate for lcat.dev used by Miniflux ingress."
spec:
  secretName: miniflux-tls
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-prod-acmedns
  dnsNames:
    - "*.lcat.dev"
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wallabag-wildcard-lcat-dev
  namespace: wallabag
  annotations:
    kubernetes.io/description: "Wildcard TLS certificate for lcat.dev used by Wallabag ingress."
spec:
  secretName: wallabag-tls
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-prod-acmedns
  dnsNames:
    - "*.lcat.dev"
