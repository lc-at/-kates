apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: lcat
  namespace: argocd
  annotations:
    kubernetes.io/description: |
      LCAT application project. Permissive project for deploying homelab applications.
      Manages: bootstrap (sealed-secrets, cert-manager), platform config, and applications (miniflux, wallabag).
spec:
  sourceRepos:
    - "https://github.com/lc-at/-kates.git"
  destinations:
    - namespace: "*"
      server: "https://kubernetes.default.svc"
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceBlacklist:
    - group: ""
      kind: "ResourceQuota"
    - group: ""
      kind: "NetworkPolicy"
