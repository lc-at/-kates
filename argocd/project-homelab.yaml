apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: homelab
  namespace: argocd
  annotations:
    kubernetes.io/description: |
      Homelab application project. Scopes applications to manage only:
      - Namespaces: kube-system (bootstrap), cert-manager, miniflux, wallabag
      - Cluster-scoped resources: ClusterIssuer only
      - Repositories: GitHub lc-at/-kates
spec:
  sourceRepos:
    - "https://github.com/lc-at/-kates.git"
  destinations:
    - namespace: "kube-system"
      server: "https://kubernetes.default.svc"
    - namespace: "cert-manager"
      server: "https://kubernetes.default.svc"
    - namespace: "miniflux"
      server: "https://kubernetes.default.svc"
    - namespace: "wallabag"
      server: "https://kubernetes.default.svc"
    - namespace: "argocd"
      server: "https://kubernetes.default.svc"
  clusterResourceWhitelist:
    - group: ""
      kind: "Namespace"
    - group: "cert-manager.io"
      kind: "ClusterIssuer"
    - group: "cert-manager.io"
      kind: "ClusterCertificate"
  namespaceResourceBlacklist:
    - group: ""
      kind: "ResourceQuota"
    - group: ""
      kind: "NetworkPolicy"
    - group: "*"
      kind: "ClusterRole"
    - group: "*"
      kind: "ClusterRoleBinding"
