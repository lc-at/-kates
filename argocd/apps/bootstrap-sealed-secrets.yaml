apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap-sealed-secrets
  namespace: argocd
  annotations:
    kubernetes.io/description: "Install Sealed Secrets controller. Runs first in sync wave 0."
spec:
  project: homelab
  source:
    repoURL: https://github.com/lc-at/-kates.git
    targetRevision: main
    path: bootstrap/sealed-secrets/install
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  info:
    - name: "Wave"
      value: "0"
    - name: "Purpose"
      value: "Platform bootstrap component"
