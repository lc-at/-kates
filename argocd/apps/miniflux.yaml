apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: miniflux
  namespace: argocd
  annotations:
    kubernetes.io/description: Miniflux RSS reader with PostgreSQL. Runs in sync wave 3.
spec:
  project: lcat
  source:
    repoURL: https://github.com/lc-at/-kates.git
    targetRevision: main
    path: apps/miniflux
  destination:
    server: https://kubernetes.default.svc
    namespace: miniflux
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  info:
  - name: Wave
    value: '3'
  - name: Description
    value: Miniflux RSS reader with PostgreSQL. Runs in sync wave 3.
  - name: Ingress
    value: https://miniflux.lcat.dev
  - name: Depends on
    value: platform-cert-manager-config
