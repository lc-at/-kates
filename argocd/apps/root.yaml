apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  annotations:
    kubernetes.io/description: "Root application orchestrator (app-of-apps pattern).\nSyncs all child applications in dependency\
      \ order across waves:\n      Wave 0: bootstrap-sealed-secrets\n      Wave 1: bootstrap-cert-manager-install\n      Wave\
      \ 2: platform-cert-manager-config\n      Wave 3: miniflux, wallabag"
spec:
  project: homelab
  source:
    repoURL: https://github.com/lc-at/-kates.git
    targetRevision: main
    path: argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  info:
  - name: Pattern
    value: App-of-Apps
  - name: Type
    value: Orchestrator
  - name: Total Applications
    value: '5'
