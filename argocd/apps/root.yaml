apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  annotations:
    kubernetes.io/description: Root app for app-of-apps pattern
spec:
  project: lcat
  source:
    repoURL: https://github.com/lc-at/-kates.git
    targetRevision: main
    path: argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  info:
  - name: Pattern
    value: App-of-Apps
  - name: Type
    value: Orchestrator
  - name: Total Applications
    value: '5'
