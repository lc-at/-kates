apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod-acmedns
  annotations:
    kubernetes.io/description: "Let's Encrypt production issuer using acme-dns DNS-01."
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: master@lcat.dev
    privateKeySecretRef:
      name: letsencrypt-prod-acmedns-account-key
    solvers:
      - dns01:
          acmeDNS:
            host: https://auth.acme-dns.io
            accountSecretRef:
              name: acme-dns
              key: acmedns.json
